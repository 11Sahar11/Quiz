<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>There Is / There Are - Interactive Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #B8F0E0;
    --sky: #A8D8F0;
    --peach: #FFD4B8;
    --lilac: #D4C4F0;
    --coral: #FF8A80;
    --green: #69DB7C;
    --dark: #2D3436;
    --bg: #F0F7FF;
    --card: #FFFFFF;
    --correct-bg: #E8F8F0;
    --wrong-bg: #FFF0EE;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Fredoka', 'Rubik', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 20px;
    direction: ltr;
    position: relative;
    overflow-x: hidden;
  }

  /* Floating decorative shapes */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    opacity: 0.15;
    pointer-events: none;
  }
  body::before {
    width: 300px; height: 300px;
    background: var(--lilac);
    top: -80px; right: -80px;
  }
  body::after {
    width: 250px; height: 250px;
    background: var(--peach);
    bottom: -60px; left: -60px;
  }

  .container {
    max-width: 750px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 30px;
    animation: slideDown 0.6s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header h1 {
    font-size: 2.2em;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .header h1 span {
    background: linear-gradient(135deg, #6C5CE7, #0984E3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    font-family: 'Rubik', sans-serif;
    color: #636E72;
    font-size: 1em;
    direction: rtl;
  }

  /* Help Box */
  .help-box {
    background: linear-gradient(135deg, #DFE6FF 0%, #F0E6FF 100%);
    border-radius: 18px;
    padding: 20px 24px;
    margin-bottom: 28px;
    border: 2px solid rgba(108, 92, 231, 0.15);
    animation: fadeIn 0.8s ease 0.2s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .help-box h3 {
    font-size: 1.15em;
    color: #6C5CE7;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .help-box .rules {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .rule {
    background: rgba(255,255,255,0.7);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 0.9em;
    line-height: 1.5;
  }

  .rule .english {
    font-weight: 600;
    color: #6C5CE7;
    font-size: 1em;
  }

  .rule .hebrew {
    font-family: 'Rubik', sans-serif;
    color: #636E72;
    font-size: 0.85em;
    direction: rtl;
  }

  /* Progress Bar */
  .progress-area {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
    animation: fadeIn 0.8s ease 0.3s both;
  }

  .progress-bar {
    flex: 1;
    height: 14px;
    background: #E0E7EE;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6C5CE7, #0984E3);
    border-radius: 20px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .progress-text {
    font-weight: 600;
    font-size: 0.95em;
    color: #636E72;
    white-space: nowrap;
  }

  /* Score Display */
  .score-display {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    animation: fadeIn 0.8s ease 0.4s both;
  }

  .score-box {
    flex: 1;
    text-align: center;
    padding: 12px;
    border-radius: 14px;
    font-weight: 600;
  }

  .score-correct {
    background: var(--correct-bg);
    color: #2D9E5A;
  }

  .score-wrong {
    background: var(--wrong-bg);
    color: #E74C3C;
  }

  .score-box .num {
    font-size: 1.8em;
    display: block;
    line-height: 1.2;
  }

  .score-box .label {
    font-size: 0.8em;
    opacity: 0.8;
  }

  /* Question Card */
  .question-card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: cardIn 0.5s ease;
    border: 2px solid transparent;
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .question-card.correct {
    border-color: var(--green);
    background: var(--correct-bg);
  }

  .question-card.wrong {
    border-color: var(--coral);
    background: var(--wrong-bg);
  }

  .q-number {
    display: inline-block;
    background: linear-gradient(135deg, #6C5CE7, #0984E3);
    color: white;
    width: 36px;
    height: 36px;
    line-height: 36px;
    text-align: center;
    border-radius: 50%;
    font-weight: 700;
    font-size: 0.95em;
    margin-bottom: 14px;
  }

  .q-hint {
    font-family: 'Rubik', sans-serif;
    direction: rtl;
    font-size: 0.85em;
    color: #888;
    margin-bottom: 10px;
    background: #F5F0FF;
    display: inline-block;
    padding: 4px 12px;
    border-radius: 8px;
  }

  .q-sentence {
    font-size: 1.35em;
    color: var(--dark);
    line-height: 1.8;
    margin-bottom: 18px;
    font-weight: 500;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }

  /* Options */
  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .option-btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.05em;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 12px;
    border: 2.5px solid #DDE4EE;
    background: white;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.2s ease;
    outline: none;
  }

  .option-btn:hover {
    border-color: #6C5CE7;
    background: #F5F0FF;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(108,92,231,0.15);
  }

  .option-btn:active {
    transform: translateY(0);
  }

  .option-btn.selected-correct {
    border-color: var(--green);
    background: #E8F8F0;
    color: #2D9E5A;
    pointer-events: none;
  }

  .option-btn.selected-wrong {
    border-color: var(--coral);
    background: #FFF0EE;
    color: #E74C3C;
    pointer-events: none;
    animation: shake 0.4s ease;
  }

  .option-btn.show-correct {
    border-color: var(--green);
    background: #E8F8F0;
    color: #2D9E5A;
    pointer-events: none;
  }

  .option-btn.disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Feedback */
  .feedback {
    margin-top: 14px;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 0.95em;
    display: none;
    line-height: 1.5;
  }

  .feedback.show { display: block; animation: fadeIn 0.3s ease; }

  .feedback.correct-fb {
    background: #E8F8F0;
    color: #2D9E5A;
  }

  .feedback.wrong-fb {
    background: #FFF0EE;
    color: #C0392B;
  }

  /* Final Results */
  .results-card {
    display: none;
    background: var(--card);
    border-radius: 24px;
    padding: 40px;
    box-shadow: var(--shadow);
    text-align: center;
    animation: cardIn 0.6s ease;
  }

  .results-card.show { display: block; }

  .results-emoji { font-size: 4em; margin-bottom: 14px; }
  .results-title { font-size: 1.8em; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
  .results-score { font-size: 1.2em; color: #636E72; margin-bottom: 24px; }

  .results-bar-bg {
    width: 100%;
    height: 22px;
    background: #E0E7EE;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .results-bar-fill {
    height: 100%;
    border-radius: 20px;
    transition: width 1s ease;
    background: linear-gradient(90deg, #6C5CE7, #0984E3);
  }

  .results-msg {
    font-family: 'Rubik', sans-serif;
    direction: rtl;
    font-size: 1.05em;
    color: #636E72;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .restart-btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1em;
    font-weight: 600;
    padding: 14px 40px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #6C5CE7, #0984E3);
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(108,92,231,0.3);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.6em; }
    .help-box .rules { grid-template-columns: 1fr; }
    .question-card { padding: 20px; }
    .q-sentence { font-size: 1.15em; }
    .results-card { padding: 28px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🏠 <span>There Is / There Are</span></h1>
    <p>בחרו את המילה הנכונה להשלמת המשפט 💪</p>
  </div>

  <!-- Help Box -->
  <div class="help-box">
    <h3>💡 כללים חשובים</h3>
    <div class="rules">
      <div class="rule">
        <div class="english">There is / There isn't</div>
        <div class="hebrew">ליחיד (singular) 🧍</div>
      </div>
      <div class="rule">
        <div class="english">There are / There aren't</div>
        <div class="hebrew">לרבים (plural) 👥</div>
      </div>
      <div class="rule">
        <div class="english">There is / There are</div>
        <div class="hebrew">✅ יש (חיובי)</div>
      </div>
      <div class="rule">
        <div class="english">There isn't / There aren't</div>
        <div class="hebrew">❌ אין (שלילי)</div>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-area">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 15</div>
  </div>

  <!-- Score -->
  <div class="score-display">
    <div class="score-box score-correct">
      <span class="num" id="correctCount">0</span>
      <span class="label">✅ נכון</span>
    </div>
    <div class="score-box score-wrong">
      <span class="num" id="wrongCount">0</span>
      <span class="label">❌ לא נכון</span>
    </div>
  </div>

  <!-- Questions Container -->
  <div id="questionsArea"></div>

  <!-- Results -->
  <div class="results-card" id="resultsCard">
    <div class="results-emoji" id="resultsEmoji"></div>
    <div class="results-title" id="resultsTitle"></div>
    <div class="results-score" id="resultsScore"></div>
    <div class="results-bar-bg"><div class="results-bar-fill" id="resultsBar"></div></div>
    <div class="results-msg" id="resultsMsg"></div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 נסו שוב!</button>
  </div>
</div>

<script>
const questions = [
  {
    before: "___",
    after: "a cat on the sofa.",
    hint: "🐱 חתול אחד = יחיד, חיובי",
    answer: "There is",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "three books on the table.",
    hint: "📚 שלושה ספרים = רבים, חיובי",
    answer: "There are",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "any milk in the fridge.",
    hint: "🥛 אין חלב = יחיד, שלילי",
    answer: "There isn't",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "two dogs in the park.",
    hint: "🐶 שני כלבים = רבים, חיובי",
    answer: "There are",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "a window in this room.",
    hint: "🪟 חלון אחד = יחיד, חיובי",
    answer: "There is",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "any students in the classroom.",
    hint: "🏫 אין תלמידים = רבים, שלילי",
    answer: "There aren't",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "a ball under the bed.",
    hint: "⚽ כדור אחד = יחיד, חיובי",
    answer: "There is",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "five chairs in the kitchen.",
    hint: "🪑 חמישה כיסאות = רבים, חיובי",
    answer: "There are",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "any teacher in the office.",
    hint: "🚫 any = רמז לשלילה! מורה = יחיד, שלילי",
    answer: "There isn't",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "many stars in the sky.",
    hint: "⭐ הרבה כוכבים = רבים, חיובי",
    answer: "There are",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "a phone on the desk.",
    hint: "📱 טלפון אחד = יחיד, חיובי",
    answer: "There is",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "any apples in the bag.",
    hint: "🍎 אין תפוחים = רבים, שלילי",
    answer: "There aren't",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "four pencils in the box.",
    hint: "✏️ ארבעה עפרונות = רבים, חיובי",
    answer: "There are",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "any clock on the wall.",
    hint: "🕐 any = רמז לשלילה! שעון = יחיד, שלילי",
    answer: "There isn't",
    options: ["There is", "There are", "There isn't", "There aren't"]
  },
  {
    before: "___",
    after: "a big garden behind the house.",
    hint: "🌳 גינה אחת = יחיד, חיובי",
    answer: "There is",
    options: ["There is", "There are", "There isn't", "There aren't"]
  }
];

let correct = 0;
let wrong = 0;
let answered = 0;

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuestions() {
  const area = document.getElementById('questionsArea');
  area.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;

    const shuffledOpts = shuffleArray(q.options);

    card.innerHTML = `
      <div class="q-number">${i + 1}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="q-sentence">
        <span style="color:#6C5CE7;font-weight:700;border-bottom:3px dashed #6C5CE7;padding:0 6px;">______</span>
        <span>${q.after}</span>
      </div>
      <div class="options" id="opts-${i}">
        ${shuffledOpts.map((opt, oi) => `
          <button class="option-btn" data-qi="${i}" data-oi="${oi}">${opt}</button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    area.appendChild(card);

    // Attach click handlers safely (avoids apostrophe issues in inline onclick)
    card.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        checkAnswer(parseInt(this.dataset.qi), this.textContent, this);
      });
    });
  });
}

function checkAnswer(index, selected, btn) {
  const q = questions[index];
  const card = document.getElementById(`card-${index}`);
  const fb = document.getElementById(`fb-${index}`);
  const opts = document.querySelectorAll(`#opts-${index} .option-btn`);

  // Disable all options
  opts.forEach(o => o.classList.add('disabled'));

  if (selected === q.answer) {
    btn.classList.add('selected-correct');
    card.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `✅ !מצוין <strong>${q.answer}</strong> היא התשובה הנכונה`;
    correct++;
  } else {
    btn.classList.add('selected-wrong');
    card.classList.add('wrong');
    // Show correct answer
    opts.forEach(o => {
      if (o.textContent === q.answer) o.classList.add('show-correct');
    });
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `❌ לא נכון. התשובה הנכונה היא: <strong>${q.answer}</strong>`;
    wrong++;
  }

  answered++;
  updateProgress();

  if (answered === questions.length) {
    setTimeout(showResults, 800);
  } else {
    // Scroll to next unanswered
    setTimeout(() => {
      const nextCard = document.querySelector('.question-card:not(.correct):not(.wrong)');
      if (nextCard) nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 500);
  }
}

function updateProgress() {
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('progressText').textContent = `${answered} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${(answered / questions.length) * 100}%`;
}

function showResults() {
  const pct = Math.round((correct / questions.length) * 100);
  const card = document.getElementById('resultsCard');
  const emoji = document.getElementById('resultsEmoji');
  const title = document.getElementById('resultsTitle');
  const score = document.getElementById('resultsScore');
  const bar = document.getElementById('resultsBar');
  const msg = document.getElementById('resultsMsg');

  if (pct >= 90) {
    emoji.textContent = '🌟';
    title.textContent = '!מדהים';
    msg.textContent = 'עבודה מעולה! שולטים בחומר!';
  } else if (pct >= 70) {
    emoji.textContent = '😊';
    title.textContent = '!כל הכבוד';
    msg.textContent = 'יופי! כמעט שם. תרגלו עוד קצת את מה שטעיתם.';
  } else if (pct >= 50) {
    emoji.textContent = '💪';
    title.textContent = 'לא רע!';
    msg.textContent = 'בכיוון הנכון! חזרו על הכללים ונסו שוב.';
  } else {
    emoji.textContent = '📖';
    title.textContent = 'צריך עוד תרגול';
    msg.textContent = 'לא נורא! חזרו על הכללים למעלה ונסו שוב. בהצלחה!';
  }

  score.textContent = `${correct} מתוך ${questions.length} — ${pct}%`;

  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });

  setTimeout(() => {
    bar.style.width = `${pct}%`;
    if (pct >= 70) bar.style.background = 'linear-gradient(90deg, #2D9E5A, #69DB7C)';
    else if (pct >= 50) bar.style.background = 'linear-gradient(90deg, #F39C12, #F1C40F)';
    else bar.style.background = 'linear-gradient(90deg, #E74C3C, #FF8A80)';
  }, 100);
}

function restartQuiz() {
  correct = 0;
  wrong = 0;
  answered = 0;
  updateProgress();
  document.getElementById('resultsCard').classList.remove('show');
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initialize
renderQuestions();
</script>
</body>
</html>
